version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"
    commit-message:
      prefix: "chore"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: monthly
    groups:
      python-deps:
        patterns:
          - "*"
    commit-message:
      prefix: "chore"

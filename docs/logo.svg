<svg width="480" height="140" viewBox="0 0 480 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="480" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="vkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4C75A3"/>
      <stop offset="100%" stop-color="#2787F5"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="480" height="140" rx="12" fill="url(#bg)"/>
  <rect width="480" height="140" rx="12" fill="none" stroke="#30363d" stroke-width="1"/>

  <text x="50%" y="50%" dominant-baseline="central" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
    font-size="80" font-weight="800" letter-spacing="-4">
    <tspan fill="#f0f6fc">Fast</tspan><tspan fill="url(#vkGrad)" filter="url(#glow)">VK</tspan>
  </text>
</svg>
